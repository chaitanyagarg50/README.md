<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09001f"/>
      <stop offset="50%" stop-color="#1e0652"/>
      <stop offset="100%" stop-color="#09001f"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#09001f" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="65%"  stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#09001f" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 0.95; }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 0.80; }
      }
      .p1 { animation: pulse  3.2s ease-in-out infinite; }
      .p2 { animation: pulse2 4.1s ease-in-out infinite; }
      .p3 { animation: pulse  5.0s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- ── Left network ── -->
  <line x1="42"  y1="32"  x2="92"  y2="58"  stroke="#4c1d95" stroke-width="0.8" opacity="0.5"/>
  <line x1="92"  y1="58"  x2="58"  y2="95"  stroke="#4c1d95" stroke-width="0.8" opacity="0.5"/>
  <line x1="92"  y1="58"  x2="132" y2="42"  stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="58"  y1="95"  x2="32"  y2="125" stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="58"  y1="95"  x2="102" y2="135" stroke="#4c1d95" stroke-width="0.8" opacity="0.5"/>
  <line x1="102" y1="135" x2="162" y2="82"  stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="32"  y1="125" x2="48"  y2="170" stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="162" y1="82"  x2="132" y2="42"  stroke="#4c1d95" stroke-width="0.8" opacity="0.3"/>
  <!-- nodes -->
  <circle class="p1" cx="42"  cy="32"  r="2.5" fill="#a78bfa" filter="url(#soft)"/>
  <circle class="p2" cx="92"  cy="58"  r="3.5" fill="#c084fc" filter="url(#glow)"/>
  <circle class="p3" cx="58"  cy="95"  r="3.0" fill="#7c3aed" filter="url(#soft)"/>
  <circle          cx="132" cy="42"  r="2.0" fill="#6d28d9" opacity="0.5"/>
  <circle class="p1" cx="32"  cy="125" r="2.5" fill="#7c3aed" filter="url(#soft)"/>
  <circle class="p2" cx="102" cy="135" r="3.0" fill="#a78bfa" filter="url(#soft)"/>
  <circle          cx="162" cy="82"  r="2.0" fill="#6d28d9" opacity="0.5"/>
  <circle          cx="48"  cy="170" r="2.0" fill="#7c3aed" opacity="0.4"/>

  <!-- ── Right network (mirrored) ── -->
  <line x1="1158" y1="32"  x2="1108" y2="58"  stroke="#4c1d95" stroke-width="0.8" opacity="0.5"/>
  <line x1="1108" y1="58"  x2="1142" y2="95"  stroke="#4c1d95" stroke-width="0.8" opacity="0.5"/>
  <line x1="1108" y1="58"  x2="1068" y2="42"  stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="1142" y1="95"  x2="1168" y2="125" stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="1142" y1="95"  x2="1098" y2="135" stroke="#4c1d95" stroke-width="0.8" opacity="0.5"/>
  <line x1="1098" y1="135" x2="1038" y2="82"  stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="1168" y1="125" x2="1152" y2="170" stroke="#4c1d95" stroke-width="0.8" opacity="0.4"/>
  <line x1="1038" y1="82"  x2="1068" y2="42"  stroke="#4c1d95" stroke-width="0.8" opacity="0.3"/>
  <!-- nodes -->
  <circle class="p2" cx="1158" cy="32"  r="2.5" fill="#a78bfa" filter="url(#soft)"/>
  <circle class="p1" cx="1108" cy="58"  r="3.5" fill="#c084fc" filter="url(#glow)"/>
  <circle class="p3" cx="1142" cy="95"  r="3.0" fill="#7c3aed" filter="url(#soft)"/>
  <circle          cx="1068" cy="42"  r="2.0" fill="#6d28d9" opacity="0.5"/>
  <circle class="p2" cx="1168" cy="125" r="2.5" fill="#7c3aed" filter="url(#soft)"/>
  <circle class="p1" cx="1098" cy="135" r="3.0" fill="#a78bfa" filter="url(#soft)"/>
  <circle          cx="1038" cy="82"  r="2.0" fill="#6d28d9" opacity="0.5"/>
  <circle          cx="1152" cy="170" r="2.0" fill="#7c3aed" opacity="0.4"/>

  <!-- ── Name ── -->
  <text
    x="600" y="107"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="64" font-weight="700"
    fill="white" text-anchor="middle" letter-spacing="-1.5"
    filter="url(#glow)">Chaitanya Garg</text>

  <!-- ── Subtitle ── -->
  <text
    x="600" y="150"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13" fill="#a78bfa" text-anchor="middle" letter-spacing="5"
    opacity="0.88">CS &amp; AI/ML  ·  SGT UNIVERSITY  ·  GURUGRAM</text>

  <!-- ── Bottom glow line ── -->
  <rect x="0" y="215" width="1200" height="4" fill="url(#line)"/>
</svg>
